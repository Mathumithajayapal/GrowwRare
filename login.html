<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Vintage Volumes · Join the Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/jpeg" href="images/growwpark_logo.jpg">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #1F3B4B;
      --copper: #AF6E4B;
      --parchment: #FDF6E9;
      --dust: #DCD2C0;
      --gold-leaf: #B8916E;
      --shadow: 0 20px 35px -8px rgba(31, 59, 75, 0.2);
      --transition: all 0.3s ease;
    }
    .dark-mode {
      --ink: #FDF6E9;
      --copper: #B8916E;
      --parchment: #000000;
      --dust: #333333;
      --gold-leaf: #AF6E4B;
      --text-light: #DDDDDD;
      --shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--parchment);
      color: var(--ink);
      min-height: 100vh;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }
    h1, h2, h3, h4, h5, h6, .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* Theme and RTL controls */
    .theme-controls {
      position: fixed;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 8px;
      z-index: 1000;
    }
    .theme-controls .control-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--parchment);
      border: 2px solid var(--copper);
      color: var(--copper);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      box-shadow: var(--shadow);
    }
    .theme-controls .control-btn:hover {
      transform: scale(1.1);
      background: var(--copper);
      color: var(--parchment);
    }

    .register-container {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .register-wrapper {
      max-width: 420px;
      width: 100%;
      background: var(--parchment);
      border-radius: 25px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--dust);
    }

    /* Register Form */
    .register-form {
      padding: 30px 30px 25px;
      background: var(--parchment);
      display: flex;
      flex-direction: column;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 15px;
    }
    .logo i {
      font-size: 32px;
      color: var(--copper);
    }
    .logo-text {
      font-size: 25px;
      font-weight: 500;
      color: var(--copper);
    }
    .dark-mode .logo-text,
    .dark-mode .logo i {
      color: var(--copper);
    }

    .form-header {
      margin-bottom: 20px;
      text-align: center;
    }
    .form-header h2 {
      font-size: 1.8rem;
      color: var(--ink);
      margin-bottom: 8px;
      font-weight: 700;
    }
    .form-header p {
      color: #4b5f6b;
      font-size: 0.9rem;
      font-weight: 300;
    }
    .dark-mode .form-header p {
      color: #aaaaaa;
    }
    .form-header p a {
      color: var(--copper);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }
    .form-header p a:hover {
      text-decoration: underline;
    }

    .social-register {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 8px;
      border: 1px solid var(--dust);
      border-radius: 50px;
      background: transparent;
      color: var(--ink);
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .dark-mode .social-btn {
      color: var(--ink);
      border-color: var(--dust);
    }
    .social-btn:hover {
      border-color: var(--copper);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px -6px rgba(175,110,75,0.2);
      background: rgba(175,110,75,0.04);
    }
    .social-btn i {
      font-size: 16px;
      color: var(--copper);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 15px 0;
      color: var(--ink);
      font-size: 0.8rem;
      opacity: 0.7;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--dust);
    }

    .input-group {
      margin-bottom: 16px;
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--copper);
      font-size: 16px;
      z-index: 2;
    }
    .input-field {
      width: 100%;
      padding: 14px 14px 14px 48px;
      border: 1px solid var(--dust);
      border-radius: 50px;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.7);
      color: var(--ink);
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }
    .dark-mode .input-field {
      background: #222222;
      color: #FDF6E9;
      border-color: #444444;
    }
    .input-field:focus {
      border-color: var(--copper);
      outline: none;
      box-shadow: 0 0 0 3px rgba(175,110,75,0.15);
    }

    .terms {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 15px 0 20px;
      cursor: pointer;
    }
    .terms input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--copper);
      cursor: pointer;
      flex-shrink: 0;
    }
    .terms span {
      color: var(--ink);
      font-size: 0.9rem;
      opacity: 0.9;
      line-height: 1.4;
    }
    .dark-mode .terms span {
      color: #cccccc;
    }
    .terms a {
      color: var(--copper);
      text-decoration: none;
      font-weight: 600;
    }
    .terms a:hover {
      text-decoration: underline;
    }

    .register-submit {
      width: 100%;
      padding: 16px;
      background: var(--copper);
      border: none;
      border-radius: 60px;
      color: #1f2e36;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 15px;
    }
    .dark-mode .register-submit {
      color: #ffffff;
    }
    .register-submit:hover {
      background: #9a5e3d;
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .register-submit i {
      transition: transform 0.3s;
      font-size: 16px;
    }
    .register-submit:hover i {
      transform: translateX(5px);
    }

    .login-prompt {
      text-align: center;
      color: #4b5f6b;
      font-size: 0.95rem;
      margin-top: 5px;
    }
    .dark-mode .login-prompt {
      color: #aaaaaa;
    }
    .login-prompt a {
      color: var(--copper);
      text-decoration: none;
      font-weight: 600;
      margin-left: 5px;
    }
    .login-prompt a:hover {
      text-decoration: underline;
    }

    /* RTL */
    [dir="rtl"] .input-icon {
      left: auto;
      right: 16px;
    }
    [dir="rtl"] .input-field {
      padding: 14px 48px 14px 14px;
    }
    [dir="rtl"] .register-submit i {
      transform: rotate(180deg);
    }
    [dir="rtl"] .register-submit:hover i {
      transform: rotate(180deg) translateX(5px);
    }
    [dir="rtl"] .theme-controls {
      right: auto;
      left: 15px;
    }

    /* Mobile Responsive - COMPLETELY FIXED */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        justify-content: flex-start;
        padding-top: 70px;
      }
      
      .theme-controls {
        position: fixed;
        top: 10px;
        right: 10px;
        margin: 0;
        z-index: 1000;
      }
      
      .theme-controls .control-btn {
        width: 42px;
        height: 42px;
        font-size: 18px;
        background: var(--parchment);
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      }
      
      .register-container {
        margin-top: 0;
        width: 100%;
      }
      
      .register-wrapper {
        max-width: 100%;
        width: 100%;
      }
      
      .register-form {
        padding: 25px 20px 20px;
      }
      
      .logo i {
        font-size: 30px;
      }
      
      .logo-text {
        font-size: 26px;
      }
      
      .form-header h2 {
        font-size: 1.7rem;
      }
      
      .form-header p {
        font-size: 0.85rem;
      }
      
      .social-register {
        gap: 8px;
      }
      
      .social-btn {
        padding: 10px 5px;
        font-size: 0.8rem;
        border-radius: 40px;
      }
      
      .social-btn i {
        font-size: 14px;
      }
      
      .divider {
        margin: 12px 0;
        font-size: 0.75rem;
      }
      
      .input-group {
        margin-bottom: 14px;
      }
      
      .input-icon {
        left: 14px;
        font-size: 15px;
      }
      
      .input-field {
        padding: 12px 12px 12px 45px;
        font-size: 0.9rem;
      }
      
      .terms {
        margin: 12px 0 18px;
      }
      
      .terms span {
        font-size: 0.85rem;
      }
      
      .terms input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }
      
      .register-submit {
        padding: 14px;
        font-size: 0.95rem;
      }
      
      .login-prompt {
        font-size: 0.9rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
        padding-top: 65px;
      }
      
      .theme-controls {
        top: 8px;
        right: 8px;
      }
      
      .theme-controls .control-btn {
        width: 40px;
        height: 40px;
        font-size: 16px;
      }
      
      .register-form {
        padding: 20px 18px 18px;
      }
      
      .logo i {
        font-size: 28px;
      }
      
      .logo-text {
        font-size: 24px;
      }
      
      .form-header h2 {
        font-size: 1.5rem;
      }
      
      .form-header p {
        font-size: 0.8rem;
      }
      
      .social-register {
        flex-direction: row;
        gap: 6px;
      }
      
      .social-btn {
        padding: 8px 3px;
        font-size: 0.7rem;
        border-radius: 30px;
      }
      
      .social-btn i {
        font-size: 12px;
      }
      
      .divider {
        margin: 10px 0;
        font-size: 0.7rem;
      }
      
      .input-group {
        margin-bottom: 12px;
      }
      
      .input-icon {
        left: 12px;
        font-size: 14px;
      }
      
      .input-field {
        padding: 10px 10px 10px 42px;
        font-size: 0.85rem;
      }
      
      .terms {
        margin: 10px 0 15px;
        gap: 8px;
      }
      
      .terms span {
        font-size: 0.8rem;
      }
      
      .terms input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }
      
      .register-submit {
        padding: 12px;
        font-size: 0.9rem;
      }
      
      .login-prompt {
        font-size: 0.85rem;
      }
    }

    @media (max-width: 360px) {
      body {
        padding: 10px;
        padding-top: 60px;
      }
      
      .theme-controls {
        top: 6px;
        right: 6px;
      }
      
      .theme-controls .control-btn {
        width: 36px;
        height: 36px;
        font-size: 15px;
      }
      
      .register-form {
        padding: 15px 12px 12px;
      }
      
      .logo i {
        font-size: 24px;
      }
      
      .logo-text {
        font-size: 22px;
      }
      
      .form-header h2 {
        font-size: 1.3rem;
      }
      
      .form-header p {
        font-size: 0.75rem;
      }
      
      .social-register {
        flex-direction: column;
        gap: 6px;
      }
      
      .social-btn {
        padding: 10px;
        font-size: 0.8rem;
      }
      
      .social-btn i {
        font-size: 14px;
      }
      
      .input-field {
        padding: 8px 8px 8px 38px;
        font-size: 0.8rem;
      }
      
      .input-icon {
        left: 10px;
        font-size: 12px;
      }
      
      .terms span {
        font-size: 0.7rem;
      }
      
      .register-submit {
        padding: 10px;
        font-size: 0.85rem;
      }
    }
    @media (max-width: 1024px) and (min-width: 768px) {
  .register-wrapper {
    max-width: 360px;   /* reduce width like signIn */
  }

  .register-form {
    padding: 22px 22px 18px;  /* tighter padding */
  }
}
@media (max-width: 1024px) and (min-width: 768px) {
  .logo-text {
    font-size: 22px;
  }

  .form-header h2 {
    font-size: 1.6rem;
  }

  .input-field {
    font-size: 0.9rem;
    padding: 12px 12px 12px 45px;
  }

  .register-submit {
    padding: 14px;
    font-size: 0.95rem;
  }
}
  </style>
</head>
<body>
  <!-- Theme and RTL controls -->
  <div class="theme-controls">
    <button class="control-btn" id="themeToggle" title="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
    <button class="control-btn" id="rtlToggle" title="Toggle RTL">
      <i class="fas fa-exchange-alt"></i>
    </button>
  </div>

  <div class="register-container">
    <div class="register-wrapper">
      <div class="register-form">
        <a href="index.html" class="logo">
          <i class="fas fa-feather-alt"></i>
          <span class="logo-text">Vintage Volumes</span>
        </a>

        <div class="form-header">
        <h2>Create your account</h2>
          <p>Already a member? <a href="signIn.html">Sign up</a></p>
        </div>

        <div class="social-register">
          <button class="social-btn"><i class="fab fa-google"></i><span>Google</span></button>
          <button class="social-btn"><i class="fab fa-facebook-f"></i><span>Facebook</span></button>
          <button class="social-btn"><i class="fab fa-apple"></i><span>Apple</span></button>
        </div>

        <div class="divider">
          <span class="divider-line"></span>
          <span>or register with email</span>
          <span class="divider-line"></span>
        </div>

        <form id="registerForm">
          <div class="input-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" class="input-field" placeholder="Full name" required value="Arthur Penden">
          </div>
          
          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="input-field" placeholder="Email address" required value="a.penden@rarebooks.com">
          </div>
          
          <div class="input-group">
            <i class="fas fa-phone input-icon"></i>
            <input type="tel" class="input-field" placeholder="Phone (optional)" value="+44 20 7946 0138">
          </div>

          <label class="terms">
            <input type="checkbox" checked>
            <span>I agree to the <a href="#">Collector's Terms</a> and <a href="#">Privacy</a></span>
          </label>

         <button type="submit" class="register-submit">
            <span>Create account</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </form>

        <div class="login-prompt">
          Already have an account? <a href="signIn.html">Sign up</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // Form submission
      document.getElementById('registerForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const termsChecked = document.querySelector('.terms input').checked;
        
        if (!termsChecked) {
          alert('Please agree to our Collector\'s Terms and Privacy Policy.');
        } else {
          alert('📚 Welcome to the Vintage Volumes Society! A verification email has been sent to your inbox.');
        }
      });

      // Theme toggle
      function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        const themeIcon = document.querySelector('#themeToggle i');
        if (themeIcon) {
          themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      }

      // RTL toggle
      function toggleRTL() {
        const html = document.documentElement;
        const isRTL = html.getAttribute('dir') === 'rtl';
        html.setAttribute('dir', isRTL ? 'ltr' : 'rtl');
        localStorage.setItem('direction', html.getAttribute('dir'));
      }

      // Attach listeners
      document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
      document.getElementById('rtlToggle')?.addEventListener('click', toggleRTL);

      // Load saved preferences
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        const themeIcon = document.querySelector('#themeToggle i');
        if (themeIcon) themeIcon.className = 'fas fa-sun';
      }
      if (localStorage.getItem('direction') === 'rtl') {
        document.documentElement.setAttribute('dir', 'rtl');
      }

      // Social buttons placeholder
      document.querySelectorAll('.social-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          alert('Social registration is not active. Please use the form to join.');
        });
      });
    })();
  </script>
</body>
</html>
