<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vintage Volumes · Join the Reading Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Playfair Display for headings, Poppins for body (bookstore vibe) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="icon" href="favicon.jpg" type="image/x-icon"> 

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #2C1810;          /* rich dark brown – like old leather bindings */
      --paper: #F5E6D3;        /* warm antique paper – background */
      --gold: #B68B5C;         /* aged gold – highlights, buttons */
      --dust: #DBC9B8;         /* soft neutral – borders, cards */
      --shadow: 0 4px 12px rgba(44,24,16,0.15);
      --shadow-lg: 0 15px 30px rgba(44,24,16,0.2);
      --transition: all 0.3s ease;
    }
    .dark-mode {
      --ink: #F5E6D3;
      --paper: #000000;        /* pure black background */
      --gold: #C9A77D;
      --dust: #4A3A2F;
      --bg: #000000;
      --text: #F5E6D3;
      --text-light: #DBC9B8;
    }
    body {
      font-family: 'Poppins', sans-serif; 
      color: var(--ink); 
      background: var(--paper);
      min-height: 100vh; 
      transition: background-color 0.3s ease, color 0.3s ease;
      display: flex; 
      align-items: center; 
      justify-content: center;
      padding: 15px;
      position: relative;
      overflow: hidden; /* Prevents scrolling */
    }
    h1, h2, h3, h4, h5, h6, .logo-text {
      font-family: 'Playfair Display', serif; 
      font-weight: 700;
    }

    /* Theme and RTL controls - text only */
    .theme-controls {
      position: fixed;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 9999;
    }
    .theme-controls .control-btn {
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .theme-controls .control-btn:hover {
      transform: scale(1.02);
      background: var(--gold);
      color: var(--paper);
    }

    .register-container {
      width: 100%; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      padding-top: 25px;
    }
    .register-wrapper {
      max-width: 400px;
      width: 100%;
      background: var(--paper); 
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow-lg); 
      border: 1px solid var(--dust);
      transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      margin: 0 auto;
    }

    /* Register Form */
    .register-form {
      padding: 24px 24px 22px;
      background: var(--paper);
      display: flex; 
      flex-direction: column;
      transition: background-color 0.3s ease;
    }
    .logo { 
      display: flex; 
      align-items: center; 
      justify-content: center;
      gap: 10px; 
      text-decoration: none; 
      margin-bottom: 10px;
    }
    .logo i { 
      color: var(--gold); 
      font-size: 38px;
      transition: color 0.3s ease;
    }
    .logo-text {
      font-size: 25px;
      font-weight: 500;
      background: #AF6E4B; 
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .dark-mode .logo-text {
      background: linear-gradient(45deg, #D4AF37, #B68B5C);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-header { 
      margin-bottom: 16px;
      text-align: center;
    }
    .form-header h2 { 
      font-size: 1.8rem;
      color: var(--ink); 
      margin-bottom: 6px;
      transition: color 0.3s ease;
    }
    .form-header p { 
      color: var(--ink); 
      font-size: 0.9rem;
      opacity: 0.8;
      transition: color 0.3s ease;
    }
    .form-header p a { 
      color: var(--gold); 
      text-decoration: none; 
      font-weight: 600; 
      transition: color 0.3s ease; 
    }
    .form-header p a:hover { 
      text-decoration: underline; 
    }

    .social-register {
      display: flex; 
      gap: 8px; 
      margin-bottom: 16px;
    }
    .social-btn {
      flex: 1; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 6px;
      padding: 10px 6px;
      border: 1px solid var(--dust); 
      border-radius: 12px;
      background: var(--paper); 
      color: var(--ink); 
      font-weight: 500; 
      font-size: 0.8rem;
      cursor: pointer; 
      transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }
    .social-btn:hover { 
      border-color: var(--gold); 
      transform: translateY(-2px); 
      box-shadow: var(--shadow); 
    }
    .social-btn i { 
      font-size: 16px;
      color: var(--gold); 
      transition: color 0.3s ease;
    }

    .divider {
      display: flex; 
      align-items: center; 
      gap: 8px; 
      margin: 10px 0 16px;
      color: var(--ink); 
      font-size: 0.8rem;
      opacity: 0.7;
      transition: color 0.3s ease;
    }
    .divider-line { 
      flex: 1; 
      height: 1px; 
      background: var(--dust); 
      transition: background-color 0.3s ease;
    }

    .input-group {
      margin-bottom: 14px;
      position: relative;
    }
    .input-icon {
      position: absolute; 
      left: 14px; 
      top: 50%; 
      transform: translateY(-50%);
      color: var(--gold); 
      font-size: 16px;
      z-index: 2;
      transition: color 0.3s ease;
    }
    .input-field {
      width: 100%; 
      padding: 12px 12px 12px 44px;
      border: 1px solid var(--dust); 
      border-radius: 14px;
      font-size: 0.9rem;
      background: var(--paper); 
      color: var(--ink);
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.2s ease;
      font-family: 'Poppins', sans-serif;
    }
    .input-field:focus { 
      border-color: var(--gold); 
      outline: none; 
      box-shadow: 0 0 0 3px rgba(182, 139, 92, 0.2); 
    }

    .password-field { 
      position: relative; 
    }
    .password-toggle {
      position: absolute; 
      right: 14px; 
      top: 50%; 
      transform: translateY(-50%);
      background: none; 
      border: none; 
      color: var(--ink);
      cursor: pointer; 
      font-size: 17px;
      z-index: 2;
      transition: color 0.3s ease;
    }
    .password-toggle:hover { 
      color: var(--gold); 
    }

    .terms {
      display: flex; 
      align-items: center; 
      gap: 8px; 
      margin: 12px 0 16px;
      cursor: pointer;
    }
    .terms input[type="checkbox"] { 
      width: 18px;
      height: 18px; 
      accent-color: var(--gold); 
      cursor: pointer; 
      transition: accent-color 0.3s ease;
      flex-shrink: 0;
    }
    .terms span { 
      color: var(--ink); 
      font-size: 0.85rem;
      line-height: 1.4;
      transition: color 0.3s ease;
    }
    .terms a { 
      color: var(--gold); 
      text-decoration: none; 
      font-weight: 600; 
      transition: color 0.3s ease;
    }
    .terms a:hover { 
      text-decoration: underline; 
    }

    .register-submit {
      width: 100%; 
      padding: 14px;
      background: var(--gold); 
      border: none; 
      border-radius: 14px;
      color: #2C1810; 
      font-weight: 700; 
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 8px;
      margin-bottom: 12px;
    }
    .register-submit:hover {
      background: #9F7E5A; 
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(182, 139, 92, 0.3);
    }
    .register-submit i { 
      transition: transform 0.3s; 
      font-size: 16px;
    }
    .register-submit:hover i { 
      transform: translateX(5px); 
    }

    /* SINGLE ACTION LINK — unified call to action (no duplicate) */
    .action-prompt {
      text-align: center; 
      color: var(--ink); 
      font-size: 0.85rem;
      margin-top: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--dust);
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .action-prompt a { 
      color: var(--gold); 
      text-decoration: none; 
      font-weight: 600; 
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color 0.3s ease;
    }
    .action-prompt a i {
      font-size: 12px;
      transition: transform 0.2s;
    }
    .action-prompt a:hover { 
      text-decoration: underline; 
    }
    .action-prompt a:hover i {
      transform: translateX(3px);
    }

    /* RTL adjustments */
    [dir="rtl"] .input-icon { 
      left: auto; 
      right: 14px; 
    }
    [dir="rtl"] .input-field { 
      padding: 12px 44px 12px 12px; 
    }
    [dir="rtl"] .password-toggle { 
      right: auto; 
      left: 14px; 
    }
    [dir="rtl"] .register-submit i { 
      transform: rotate(180deg); 
    }
    [dir="rtl"] .register-submit:hover i { 
      transform: rotate(180deg) translateX(5px); 
    }
    [dir="rtl"] .theme-controls {
      right: auto;
      left: 12px;
    }
    [dir="rtl"] .action-prompt a i {
      transform: rotate(180deg);
    }
    [dir="rtl"] .action-prompt a:hover i {
      transform: rotate(180deg) translateX(3px);
    }

    /* Desktop - No scrolling */
    @media (min-width: 1024px) {
      body {
        overflow: hidden;
        height: 100vh;
      }
      .register-wrapper {
        max-height: 95vh;
        overflow-y: auto;
      }
    }

    /* Specific optimization for 360x740 and similar - keep card size but adjust padding if needed */
    @media (max-width: 420px) {
      body {
        padding: 8px;
      }
      .register-wrapper {
        max-width: 360px;
      }
      .register-form {
        padding: 20px 20px 18px;
      }
      .logo i {
        font-size: 34px;
      }
      .logo-text {
        font-size: 28px;
      }
      .form-header h2 {
        font-size: 1.6rem;
      }
      .social-btn {
        font-size: 0.75rem;
        padding: 8px 4px;
      }
      .social-btn i {
        font-size: 15px;
      }
      .input-field {
        padding: 10px 10px 10px 42px;
        font-size: 0.8rem;
      }
      .input-icon {
        font-size: 15px;
        left: 12px;
      }
      .password-toggle {
        font-size: 16px;
        right: 12px;
      }
      [dir="rtl"] .input-field {
        padding: 10px 42px 10px 10px;
      }
      .terms span {
        font-size: 0.8rem;
      }
      .register-submit {
        padding: 12px;
        font-size: 0.9rem;
      }
      .action-prompt {
        font-size: 0.8rem;
        padding-top: 10px;
      }
      .theme-controls {
        top: 8px;
        right: 8px;
        gap: 6px;
      }
      .theme-controls .control-btn {
        padding: 6px 12px;
        font-size: 0.75rem;
      }
      [dir="rtl"] .theme-controls {
        right: auto;
        left: 8px;
      }
    }

    /* For very small heights */
    @media (max-height: 700px) {
      .register-form {
        padding: 18px 18px 14px;
      }
      .logo {
        margin-bottom: 6px;
      }
      .form-header {
        margin-bottom: 10px;
      }
      .social-register {
        margin-bottom: 10px;
      }
      .input-group {
        margin-bottom: 10px;
      }
      .terms {
        margin: 8px 0 12px;
      }
    }
    .dark-mode .logo-text {
      background: #f5c9a6; 
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <!-- Theme and RTL controls - text only -->
  <div class="theme-controls">
    <button class="control-btn" id="themeToggle">Dark</button>
    <button class="control-btn" id="rtlToggle">LTR</button>
  </div>

  <div class="register-container">
    <div class="register-wrapper">
      <div class="register-form">
        <!-- EXACT logo from Vintage Volumes: feather icon + "Vintage Volumes" with gradient -->
        <a href="index.html" class="logo">
          <i class="fas fa-feather-alt"></i>
          <span class="logo-text">Vintage Volumes</span>
        </a>

        <div class="form-header">
          <h2>Join the Reading Club</h2>
          <p>Welcome to our circle of readers</p>
        </div>

        <div class="social-register">
          <button class="social-btn"><i class="fab fa-google"></i><span>Google</span></button>
          <button class="social-btn"><i class="fab fa-facebook-f"></i><span>Facebook</span></button>
          <button class="social-btn"><i class="fab fa-apple"></i><span>Apple</span></button>
        </div>

        <div class="divider">
          <span class="divider-line"></span>
          <span>or register with email</span>
          <span class="divider-line"></span>
        </div>

        <form id="registerForm">
          <div class="input-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" class="input-field" placeholder="Full name" required value="Emma Watson">
          </div>
          
          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" class="input-field" placeholder="Email address" required value="emma@vintagevolumes.com">
          </div>
          
          <div class="input-group password-field">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="input-field" id="password" placeholder="Password" required value="reader123">
            <button type="button" class="password-toggle" id="togglePassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>

          <div class="input-group password-field">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" class="input-field" id="confirmPassword" placeholder="Confirm password" required value="reader123">
            <button type="button" class="password-toggle" id="toggleConfirmPassword">
              <i class="fas fa-eye"></i>
            </button>
          </div>

          <label class="terms">
            <input type="checkbox" checked>
            <span>I agree to the <a href="#">Membership Terms</a> and <a href="#">Privacy</a></span>
          </label>

          <button type="submit" class="register-submit">
            <span>Create account</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </form>

        <!-- SINGLE, CLEAR SIGN-IN LINK (no duplicate) - existing members only one entry point -->
        <div class="action-prompt">
          <span>Already have an account?</span>
          <a href="login.html">
            Sign in to your library
            <i class="fas fa-arrow-right"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // Password toggles
      const togglePassword = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('password');
      if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', function() {
          const type = passwordInput.type === 'password' ? 'text' : 'password';
          passwordInput.type = type;
          this.querySelector('i').classList.toggle('fa-eye-slash');
        });
      }

      const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      if (toggleConfirmPassword && confirmPasswordInput) {
        toggleConfirmPassword.addEventListener('click', function() {
          const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
          confirmPasswordInput.type = type;
          this.querySelector('i').classList.toggle('fa-eye-slash');
        });
      }

      // Form submission
      document.getElementById('registerForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const termsChecked = document.querySelector('.terms input').checked;
        
        if (password !== confirm) {
          alert('Passwords do not match — even bookmarks need symmetry.');
        } else if (!termsChecked) {
          alert('Please agree to the Membership Terms and Privacy Policy.');
        } else {
          alert('📚 Welcome to Vintage Volumes! A verification email has been sent to your inbox.');
        }
      });

      // Theme toggle - text only
      const themeBtn = document.getElementById('themeToggle');
      function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        if (themeBtn) themeBtn.textContent = isDark ? 'Light' : 'Dark';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      }

      // RTL toggle - text only
      const rtlBtn = document.getElementById('rtlToggle');
      function toggleRTL() {
        const html = document.documentElement;
        const isRTL = html.getAttribute('dir') === 'rtl';
        html.setAttribute('dir', isRTL ? 'ltr' : 'rtl');
        if (rtlBtn) rtlBtn.textContent = isRTL ? 'LTR' : 'RTL';
        localStorage.setItem('direction', html.getAttribute('dir'));
      }

      // Attach listeners
      themeBtn?.addEventListener('click', toggleTheme);
      rtlBtn?.addEventListener('click', toggleRTL);

      // Load saved preferences
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        if (themeBtn) themeBtn.textContent = 'Light';
      }
      if (localStorage.getItem('direction') === 'rtl') {
        document.documentElement.setAttribute('dir', 'rtl');
        if (rtlBtn) rtlBtn.textContent = 'RTL';
      }

      // Social buttons placeholder
      document.querySelectorAll('.social-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          alert('Social registration is not active. Please use the form to join.');
        });
      });
    })();
  </script>
</body>
</html>
